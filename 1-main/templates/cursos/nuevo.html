{% extends 'base.html' %}

{% block content %}

<style>
    .course-card {
        border: none;
        border-radius: 18px;
        overflow: hidden;
        background: #ffffff;
    }

    .course-header {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        padding: 28px;
        color: white;
    }

    .course-header h2 {
        font-weight: 700;
        margin-bottom: 6px;
    }

    .course-header p {
        margin: 0;
        opacity: .8;
    }

    .form-section {
        padding: 35px;
    }

    .form-label {
        font-weight: 600;
        color: #334155;
        margin-bottom: 8px;
    }

    .form-control,
    .form-select {
        border-radius: 12px;
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        transition: 0.3s;
    }

    .form-control:focus,
    .form-select:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 0.15rem rgba(37, 99, 235, 0.15);
    }

    .input-group-text {
        border-radius: 12px 0 0 12px;
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        color: #475569;
    }

    .btn-save {
        background: linear-gradient(135deg, #16a34a, #15803d);
        border: none;
        border-radius: 12px;
        padding: 12px 24px;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-save:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 14px rgba(22, 163, 74, 0.25);
    }

    .btn-cancel {
        border-radius: 12px;
        padding: 12px 24px;
        font-weight: 600;
    }

    .section-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 20px;
    }

    @media(max-width: 768px) {
        .form-section {
            padding: 22px;
        }
    }
</style>

<div class="container py-4">

    <div class="card shadow-lg course-card">

        <!-- HEADER -->
        <div class="course-header d-flex justify-content-between align-items-center flex-wrap">

            <div>
                <h2>
                    <i class="fas fa-book-open me-2"></i>
                    Registrar Curso
                </h2>

                <p>
                    Complete la información para crear un nuevo curso
                </p>
            </div>

            <div class="mt-3 mt-md-0">
                <i class="fas fa-graduation-cap fa-3x text-light opacity-75"></i>
            </div>

        </div>

        <!-- BODY -->
        <div class="form-section">

            <div class="section-title">
                Información del Curso
            </div>

            <form method="POST">

                <div class="row g-4">

                    <!-- NOMBRE CURSO -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Nombre del curso
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-book"></i>
                            </span>

                            <input type="text"
                                   name="nombre_curso"
                                   class="form-control"
                                   placeholder="Ej. Programación III"
                                   required>
                        </div>
                    </div>

                    <!-- CARRERA -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Carrera
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-university"></i>
                            </span>

                            <input type="text"
                                   name="carrera"
                                   class="form-control"
                                   placeholder="Ej. Ingeniería en Sistemas"
                                   required>
                        </div>
                    </div>

                    <!-- SECCION -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Sección
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-layer-group"></i>
                            </span>

                            <input type="text"
                                   name="seccion"
                                   class="form-control"
                                   placeholder="Ej. A"
                                   >
                        </div>
                    </div>

                    <!-- CATEDRATICO -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Catedrático
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-chalkboard-teacher"></i>
                            </span>

                            <select name="id_catedratico"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Seleccione un catedrático
                                </option>

                                {% for c in catedraticos %}
                                <option value="{{ c[0] }}">
                                    {{ c[1] }} {{ c[2] }}
                                </option>
                                {% endfor %}

                            </select>
                        </div>
                    </div>

                </div>

                <!-- BOTONES -->
                <div class="d-flex gap-3 mt-5 flex-wrap">

                    <button type="submit" class="btn btn-save text-white">
                        <i class="fas fa-save me-2"></i>
                        Guardar Curso
                    </button>

                    <a href="{{ url_for('dashboard_admin') }}"
                       class="btn btn-outline-secondary btn-cancel">

                        <i class="fas fa-arrow-left me-2"></i>
                        Cancelar
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
