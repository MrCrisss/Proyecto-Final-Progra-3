<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso - Control Biométrico</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/a81368914c.js"></script>

  <style>
    body{
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .login-card{
      border-radius: 25px;
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.9);
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .login-left{
      background: linear-gradient(135deg, #6366f1, #22d3ee);
      color: white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:40px;
    }

    .login-left h3{
      font-weight:bold;
    }

    .login-right{
      padding:40px;
    }

    .form-control{
      border-radius:10px;
    }

    .input-group-text{
      border-radius:10px 0 0 10px;
    }

    .btn-login{
      border-radius:12px;
      padding:10px;
      font-weight:600;
      transition:0.3s;
    }

    .btn-login:hover{
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-9">

        <div class="card login-card border-0">
          <div class="row g-0">

            <!-- Left Side -->
            <div class="col-md-5 login-left d-none d-md-flex">
              <img src="{{ url_for('static', filename='img/logo.png') }}" style="width:80px;" class="mb-3">
              <h3>Bienvenido</h3>
              <p class="text-center">Sistema biométrico institucional moderno y seguro</p>
            </div>

            <!-- Right Side -->
            <div class="col-md-7 login-right">

              <h4 class="fw-bold mb-3">Iniciar Sesión</h4>
              <p class="text-muted small mb-4">Ingresa tus credenciales para continuar</p>

              <form method="POST" id="loginForm">

                <div class="mb-3">
                  <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Usuario" required>
                  </div>
                </div>

                <div class="mb-4">
                  <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
                  </div>
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary btn-login">Ingresar</button>
                </div>

              </form>

            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- SweetAlert2 -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
      <script>
        window.addEventListener("load", function () {
          {% for category, message in messages %}
            Swal.fire({
              icon: "error",
              title: "Error",
              text: {{ message | tojson }},
              confirmButtonColor: "#6366f1"
            });
          {% endfor %}
        });
      </script>
    {% endif %}
  {% endwith %}

</body>
</html>
